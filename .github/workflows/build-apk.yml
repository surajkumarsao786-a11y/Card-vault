name: Build Native Android APK

on:
  workflow_dispatch: # Allows you to click a button to build the app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install App Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Install Android Wrapper (Capacitor)
        run: |
          npm install @capacitor/core @capacitor/android
          npm install @capacitor/cli -D

      - name: Create Native Android Project
        run: |
          npx cap init "Roleplay Vault" "com.roleplay.vault" --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Compile APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Roleplay-Vault-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
